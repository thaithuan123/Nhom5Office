<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Users</title>
</head>

<body>

<h1>Danh Sách Users</h1>

<ul id="list"></ul>

<script>

fetch("https://backend-webbandienthoai.onrender.com/users")
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach(user => {
      html += `<li>${user.id} - ${user.name}</li>`;
    });

    document.getElementById("list").innerHTML = html;

  })
  .catch(error => {
    console.log("Lỗi:", error);
  });

</script>

</body>
</html>
