<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Users</title>
</head>

<body>

<h1>Danh Sách Users</h1>

<ul id="list"></ul>

<script>

fetch("http://localhost:3000/users")
.then(res => res.json())
.then(data => {

let html = "";

data.forEach(user => {
html += `<li>${user.id} - ${user.name}</li>`;
});

document.getElementById("list").innerHTML = html;

});

</script>

</body>
</html>
