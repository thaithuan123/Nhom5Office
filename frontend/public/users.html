<h1>Danh Sach Users</h1>
<!-- redeploy -->
<ul id="list"></ul>

<script>
fetch("https://backend-webbandienthoai.onrender.com/users")
.then(res => res.json())
.then(data => {

let html = "";

data.forEach(user => {
html += `<li>${user.id} - ${user.name}</li>`;
});

document.getElementById("list").innerHTML = html;

})
.catch(err => {
console.log("Lỗi fetch:", err);
});
</script>
